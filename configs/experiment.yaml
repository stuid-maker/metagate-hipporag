project:
  name: metagate-hipporag2
  seed: 20260711
  upstream_commit: ad30fc3e2062202d9e975e32cd28212424a56ccb
  upstream_package_version: 2.0.0-alpha.4
  data_revision: 5ec05b38deecc3318bb432c69865959c56058990
  preprocessing_version: 1

models:
  llm: gpt-4o-mini-2024-07-18
  embedding: text-embedding-3-large
  embedding_dimensions: 3072
  embedding_instruction_mode: upstream_ignored
  temperature: 0.0
  llm_seed: 20260711
  qa_max_output_tokens: 256
  gate_max_output_tokens: 256

prompts:
  gate_file: configs/gate_prompt.json
  qa_file: configs/qa_prompt.json
  openie_source: pinned_upstream_templates

retrieval:
  output_top_k: 5
  linking_top_k: 5
  ppr_damping: 0.5
  passage_node_weight: 0.05
  synonym_threshold: 0.8
  rrf_k: 60
  max_expansions: 1

sampling:
  dev_per_dataset: 100
  test_per_dataset: 300
  datasets:
    - id: nq_rear
      stratify_by: null
    - id: musique
      stratify_by: supporting_passage_count
    - id: 2wikimultihopqa
      stratify_by: type

methods:
  - llm_only
  - dense_rag
  - hipporag2
  - always_expand
  - metagate

gate:
  threshold_candidates: [0.50, 0.55, 0.60, 0.65, 0.70, 0.75, 0.80, 0.85, 0.90, 0.95]
  threshold_objective: balanced_accuracy
  threshold_target: recall_at_5_equals_1
  tuning_scope: pooled_equal_dataset_dev
  threshold_tie_breakers: [lower_expansion_rate, higher_threshold]
  final_low_confidence_action: flag_abstain_and_keep_forced_answer

statistics:
  bootstrap_resamples: 10000
  bootstrap_seed: 20260711
  confidence_level: 0.95
  em_test: mcnemar_exact
  multiple_testing_correction: holm
  holm_family: three_datasets_x_three_primary_comparisons
  ece_bins: 10
  ece_binning: equal_frequency
  selective_risk_metric: one_minus_em
  noninferiority_margin_token_f1: 0.02

evaluation:
  retrieval_match: exact_upstream_title_newline_text
  answer_alias_aggregation: maximum
  llm_only_recall: not_applicable
  false_stop_denominator: first_retrieval_insufficient
  unnecessary_expansion_denominator: first_retrieval_sufficient
  calibration_scope: first_gate_all_examples

pricing_snapshot:
  as_of: "2026-07-11"
  currency: USD
  gpt_4o_mini_input_per_million: 0.15
  gpt_4o_mini_output_per_million: 0.60
  text_embedding_3_large_per_million: 0.13
  batch_discount_fraction: 0.50

budget:
  smoke_max_actual_usd: 1.00
  project_max_actual_usd: 18.00
  actual_cache_hits_billable: false
  method_equivalent_cache_hits_billable: true
  batch_discount_scope: openie_batch_only

batch:
  max_enqueued_input_tokens: 1500000
  completion_window: 24h
  endpoint: /v1/chat/completions
  max_requests_per_shard: 5000
  poll_interval_seconds: 30
  ner_max_output_tokens: 512
  triple_max_output_tokens: 1024
